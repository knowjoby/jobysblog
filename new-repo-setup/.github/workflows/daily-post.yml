name: Daily AI PM Post

on:
  schedule:
    - cron: '0 8 * * *'   # 8 AM UTC every day
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai

      - name: Generate today's post
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_post.py

      - name: Commit and push new post
        run: |
          git config user.name "AI PM Bot"
          git config user.email "bot@users.noreply.github.com"
          git add _posts/ data/
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "post: daily AI PM article $(date +%Y-%m-%d)"
          git push
